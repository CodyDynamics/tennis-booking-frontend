# Frontend stack only (Next.js). Run backend compose separately.
# From frontend/: docker compose up -d --build
#
# NEXT_PUBLIC_API_URL: URL API mà *trình duyệt* gọi được (mặc định http://localhost:3000 = backend compose).
# Flow đăng ký OTP hay tạo user ngay do backend quyết định (SEND_REGISTRATION_EMAIL trong backend compose / .env).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: booking-tennis-web
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_HOST_PORT:-3001}:3000"
    restart: unless-stopped
