name: Deploy to EC2 (Next.js + PM2)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -euo pipefail

            APP_DIR=/home/ec2-user/tennis-booking-frontend
            NEW_DIR=${APP_DIR}-new
            OLD_DIR=${APP_DIR}-old

            echo "🚀 Starting deployment..."

            echo "📋 Copying live app to staging (keeps .env and .git remote)..."
            rm -rf "$NEW_DIR"
            mkdir -p "$NEW_DIR"
            rsync -a \
              --exclude node_modules \
              --exclude .next \
              "$APP_DIR/" "$NEW_DIR/"

            cd "$NEW_DIR"

            echo "📥 Updating to origin/main..."
            git fetch origin
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "🏗 Building Next.js app..."
            pnpm run build

            echo "🧪 Validating build..."
            test -f .next/standalone/server.js

            echo "🔁 Swapping deployment..."
            rm -rf "$OLD_DIR"
            mv "$APP_DIR" "$OLD_DIR"
            mv "$NEW_DIR" "$APP_DIR"

            cd "$APP_DIR"

            echo "🔄 Reloading PM2..."
            pm2 startOrReload ecosystem.config.js

            echo "💾 Saving PM2 state..."
            pm2 save

            echo "🧹 Removing previous release..."
            rm -rf "$OLD_DIR"

            echo "✅ Deployment complete!"
